name: Tuesday dev container

on:
  schedule:
    # Run at 1 AM every Tuesday
    - cron: '0 1 * * 2'
  workflow_dispatch:

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build container image
        run: |
          podman build -t tuesday:latest -f Containerfile .

      - name: Log in to GitHub Container Registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image for GHCR
        run: |
          podman tag tuesday:latest ghcr.io/${{ github.actor }}/tuesday:latest

      - name: Push image to GHCR
        run: |
          podman push ghcr.io/${{ github.actor }}/tuesday:latest
